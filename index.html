<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Postcard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="postcard">
        <div class="postcard-header">
            <h1>My Postcard</h1>
            <img src="https://raw.githubusercontent.com/breatheco-de/exercise-postcard/main/.learn/assets/4geeks.png" alt="4Geeks Logo" class="logo">
        </div>

        <div class="postcard-body">
            <div class="body-left">
                <p>Look how awesome! This is a postcard that I created using HTML5 and CSS3 during my 4Geeks Academy Course!</p>
                <p>This is so cool, can't wait to start doing more stuff!</p>
            </div>

            <form class="body-right">
                <input type="text" placeholder="Some Name">
                <input type="email" placeholder="Some Email">
                <input type="text" placeholder="Some comment">
            </form>
        </div>

        <div class="postcard-footer">
            <button type="submit">Send My Postcard</button>
        </div>
    </div>

</body>
</html>
